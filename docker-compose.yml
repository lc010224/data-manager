services: # 定义 Compose 中要启动和管理的服务列表
  data-manager: # 服务名称，表示当前这个容器服务叫 data-manager
    image: ghcr.io/lc010224/data-manager:latest # 指定要使用的镜像，这里从 GitHub Container Registry 拉取最新版 data-manager 镜像
    container_name: data-manager # 指定容器名称，启动后容器会显示为 data-manager，便于管理和查看
    restart: unless-stopped # 配置容器重启策略：除非手动停止，否则在异常退出或宿主机重启后自动拉起
    ports: # 配置端口映射，把宿主机端口映射到容器端口
      - "3022:80" # 将宿主机的 3022 端口映射到容器内的 80 端口，用于从外部访问服务
    environment: # 配置容器运行时的环境变量
      - TZ=Asia/Shanghai # 设置容器内时区为亚洲/上海，确保日志和时间显示符合中国时区
      - PORT=3000 # 设置应用在容器内监听的端口为 3000
      - ADMINER_URL=/adminer/index.php # 设置内置 Adminer 的访问路径
      - DATA_ROOT=/app/data # 设置数据文件根目录，容器内应用会在该路径读写数据
      - SCRIPTS_ROOT=/app/scripts # 设置脚本文件根目录，容器内应用会从这里读取或执行脚本
      - LOGS_ROOT=/app/logs # 设置日志文件根目录，容器内应用会把日志写入这里
      - STORAGE_ROOT=/app/storage # 设置存储文件根目录，容器内应用会在这里保存存储相关内容
    volumes: # 配置数据卷挂载，把宿主机目录挂载到容器内，避免数据因容器销毁而丢失
      - /home/data-manager/data:/app/data # 把宿主机的 data 目录挂载到容器内的 /app/data，用于持久化业务数据
      - /home/data-manager/scripts:/app/scripts # 把宿主机的 scripts 目录挂载到容器内的 /app/scripts，用于持久化脚本文件
      - /home/data-manager/logs:/app/logs # 把宿主机的 logs 目录挂载到容器内的 /app/logs，用于持久化日志文件
      - /home/data-manager/storage:/app/storage # 把宿主机的 storage 目录挂载到容器内的 /app/storage，用于持久化存储文件
